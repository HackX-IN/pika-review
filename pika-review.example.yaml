# Pika Review Example Configuration
# Copy this to ~/.pika-review.yaml and fill in your credentials.

ai:
  # AI Provider: 'openai', 'ollama', 'cloudflare', 'deepseek', etc.
  provider: "openai"

  # Your AI Provider API Token / Secret Key (Optional for local engines)
  apiKey: "your_api_key_here"

  # Your Account ID (Only required if using Cloudflare Workers AI)
  accountId: ""

  # The AI model to use
  # Cloud examples: gpt-4o (OpenAI), deepseek-coder (DeepSeek)
  # Cloudflare examples: @cf/meta/llama-4-scout-17b-16e-instruct
  # Ollama examples: qwen2.5-coder:7b, llama3:latest
  model: "gpt-4o"

  # Custom OpenAI-compatible endpoint (Optional)
  # Leave empty for standard OpenAI. Set for other providers:
  # - DeepSeek: https://api.deepseek.com/v1
  # - Ollama: http://localhost:11434/v1
  # - Cloudflare: https://api.cloudflare.com/client/v4/accounts/<accountId>/ai/v1
  baseURL: "https://api.openai.com/v1"

  # Custom engineered prompt (Optional)
  # Use {{code}} as a placeholder for the code to be analyzed.
  # If left empty, a highly-engineered default prompt is used.
  prompt: |
    <role>You are a Senior Security Architect.</role>
    <task>Analyze the following code for high-severity vulnerabilities: {{code}}</task>
    <output_format>Return ONLY a JSON object matching the internal schema.</output_format>

scanner:
  # Global ignores (These are merged with any local .pikaignore files)
  ignoreFiles:
    - "*.lock"
    - "package-lock.json"
    - "*.svg"
    - "*.png"
    - "node_modules"
    - ".git"
