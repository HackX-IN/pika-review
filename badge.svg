<svg xmlns="http://www.w3.org/2000/svg" width="140" height="20" role="img" aria-label="Pika Sentinel: Grade C">
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="140" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="90" height="20" fill="#2d3748"/>
    <rect x="90" width="50" height="20" fill="#F59E0B"/>
    <rect width="140" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,sans-serif" font-size="110">
    <text aria-hidden="true" x="460" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="700">Pika Sentinel</text>
    <text x="460" y="140" transform="scale(.1)" fill="#fff" textLength="700">Pika Sentinel</text>
    <text aria-hidden="true" x="1150" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="300">C</text>
    <text x="1150" y="140" transform="scale(.1)" fill="#fff" textLength="300">C</text>
  </g>
</svg>